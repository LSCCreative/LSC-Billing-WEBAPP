<style>
:root{
  --bg:#181818;--text:#F0EDE8;--surface:#2C2F35;--border:#3D4A5C;
  --accent:#B85444;--ah:#9a3d31;--muted:rgba(240,237,232,0.42);--muted2:rgba(240,237,232,0.18);
  --row-hover:rgba(240,237,232,0.03);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Funnel Sans','FunnelSans',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:'Funnel Sans','FunnelSans',sans-serif}
.delight{font-family:'Delight','Georgia',serif;font-weight:700}
#app-header{display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 24px;height:52px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg);-webkit-app-region:drag}
.logo-text{font-family:'Delight','Georgia',serif;font-weight:700;font-size:16px;color:var(--text);letter-spacing:.04em}
.logo-text em{color:var(--accent);font-style:normal}
#hdr-right{display:flex;align-items:center;gap:1.5rem;-webkit-app-region:no-drag}
.nav-link{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;padding:6px 10px;border-bottom:2px solid transparent;border-radius:4px;transition:color .2s ease-in-out,background .2s ease-in-out}
.nav-link:hover{color:var(--text);background:var(--surface)}
.nav-link.active{color:var(--text);border-bottom-color:var(--accent)}
.nav-link svg{width:18px;height:18px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn-accent:hover{background:var(--ah);border-color:var(--ah);color:#fff}
.btn-ghost{border-color:var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--muted);color:var(--text)}
.btn-danger{border-color:#5a2020;color:#e06060}
.btn-danger:hover{background:#e06060;color:#fff;border-color:#e06060}
.btn-sm{padding:5px 12px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn:disabled{opacity:.4;cursor:not-allowed}
#main{max-width:1080px;margin:0 auto;padding:34px 40px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.page-title{font-family:'Delight','Georgia',serif;font-weight:700;font-size:30px;color:var(--text);letter-spacing:.02em}
.page-sub{color:var(--muted);font-size:11px;margin-top:4px;letter-spacing:.04em;text-transform:uppercase}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:none;border:none;cursor:pointer;padding:0;margin-bottom:18px;transition:.15s}
.back-btn:hover{color:var(--accent)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.proj-card{background:var(--surface);border:1px solid var(--border);padding:22px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.proj-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:.2s;transform-origin:left}
.proj-card:hover{border-color:var(--accent)}
.proj-card:hover::after{transform:scaleX(1)}
.card-num{color:var(--accent);font-size:11px;font-weight:500;letter-spacing:.04em;margin-bottom:5px}
.card-name{font-family:'Delight','Georgia',serif;font-weight:700;font-size:18px;margin-bottom:4px;color:var(--text)}
.card-client{color:var(--muted);font-size:11px;margin-bottom:16px;text-transform:uppercase;letter-spacing:.06em}
.card-gross-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.card-gross{font-family:'Delight','Georgia',serif;font-weight:700;font-size:26px;color:var(--accent)}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.card-date{color:var(--muted);font-size:10px}
.tag{font-size:10px;padding:3px 9px;border:1px solid var(--border);color:var(--muted);letter-spacing:.05em}
.empty-state{text-align:center;padding:80px 30px;border:1px dashed var(--border)}
.empty-state h3{font-family:'Delight','Georgia',serif;font-weight:700;font-size:22px;color:var(--muted);margin-bottom:10px}
.empty-state p{color:var(--muted);font-size:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.field input,.field textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 12px;outline:none;transition:.15s;width:100%}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.field input[type=number]{-moz-appearance:textfield}
.field input[type=number]::-webkit-outer-spin-button,.field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.upid-field{border-color:var(--accent) !important}
.billing-block{border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.bb-head{display:flex;justify-content:space-between;align-items:center;background:#111;padding:9px 16px;border-bottom:1px solid var(--border)}
.bb-head.collapsible{cursor:pointer;user-select:none}
.bb-label{font-family:'Delight','Georgia',serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text)}
.bb-label-tag{font-size:9px;padding:2px 7px;border:1px solid var(--border);color:var(--muted);letter-spacing:.06em;margin-left:8px;vertical-align:middle;text-transform:uppercase;font-family:'Funnel Sans',sans-serif;font-weight:400}
.bb-sum{font-size:11px;color:var(--muted)}
.bb-sum b{color:var(--text)}
.bb-chevron{color:var(--muted);font-size:10px;margin-right:8px;display:inline-block;transition:transform .2s}
.bb-picker{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);background:rgba(61,74,92,0.12)}
.svc-select{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 10px;outline:none;cursor:pointer;max-width:420px}
.svc-select:focus{border-color:var(--accent)}
.svc-select option{background:#1e2228;color:var(--text)}
.gt-head,.gt-row{display:grid;align-items:center}
.labour-grid{grid-template-columns:3fr 90px 90px 90px 110px 32px}
.expense-grid{grid-template-columns:3fr 90px 90px 90px 110px 32px}
.deliv-grid{grid-template-columns:3fr 1fr 1fr 70px 32px}
.gt-head{border-bottom:1px solid var(--border)}
.gt-head>div{padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:400}
.gt-row{border-bottom:1px solid rgba(61,74,92,0.4)}
.gt-body>[data-rid]:last-child{border-bottom:none}
.gt-row:hover{background:var(--row-hover)}
.gt-row>div{padding:4px 10px;font-size:12px;display:flex;align-items:center}
.gt-row>div.right{justify-content:flex-end}
.gt-row>div.muted-td{color:var(--muted)}
.gt-row .num-inp{width:100%;box-sizing:border-box}
.gt-row .text-inp{width:100%;box-sizing:border-box}
.gt-row .bill-cell{width:100%;text-align:right}
.gt-body .empty-row{text-align:center;padding:18px 14px;color:var(--muted2);font-size:11px}
.empty-row td{text-align:center;color:var(--muted);font-size:11px;padding:16px 14px;font-style:italic}
.text-inp{background:#1a1c20;border:1px solid var(--border);color:var(--text);font-size:12px;font-family:'Funnel Sans',sans-serif;padding:5px 8px;outline:none;transition:.15s;width:100%}
.text-inp:focus{border-color:var(--accent)}

.text-inp:focus{border-color:var(--accent)}

.right{text-align:right}

.summary-bar{display:grid;grid-template-columns:repeat(5,1fr);margin-bottom:22px;border:1px solid var(--border);overflow:hidden}
.sum-item{padding:14px 18px;border-right:1px solid var(--border)}
.sum-item:last-child{border-right:none}
.sum-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}

.sum-value.accent{color:var(--accent)}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:18px;border-top:1px solid var(--border)}
.est-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.est-upid{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:4px}
.est-name{font-family:'Delight','Georgia',serif;font-weight:700;font-size:32px;color:var(--text);line-height:1.1}
.est-client{color:var(--muted);font-size:12px;margin-top:4px;text-transform:uppercase;letter-spacing:.07em}
.est-block{border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.est-block-head{background:#111;padding:8px 16px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border)}
.est-block-label{font-family:'Delight','Georgia',serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text)}

.est-table{width:100%;border-collapse:collapse}

.est-totals{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.totals-card{border:1px solid var(--border);overflow:hidden}

.totals-card td{padding:9px 18px;border-bottom:1px solid rgba(61,74,92,0.4);font-size:12px}

.tl{color:var(--muted)}.tv{text-align:right;font-weight:600}

.notes-card{border:1px solid var(--border);padding:18px}
.notes-card h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}

.spinner{width:11px;height:11px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.export-toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);padding:12px 18px;display:none;align-items:center;gap:10px;font-size:12px;z-index:9999}

.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}

.pricing-table input::-webkit-inner-spin-button{-webkit-appearance:none}

.tax-setting{border:1px solid var(--border);padding:18px 22px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

.pricing-save-bar{background:var(--surface);border:1px solid var(--border);padding:14px 22px;display:flex;justify-content:space-between;align-items:center}

.doc-type-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap}
.doc-type-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 10px;outline:none;cursor:pointer;transition:.15s}
.doc-type-select:focus{border-color:var(--accent)}
.inv-num-wrap{display:none;align-items:center;gap:8px}
.inv-num-wrap.show{display:flex}
.inv-num-inp{background:var(--surface);border:1px solid var(--accent);color:var(--text);font-size:12px;padding:6px 10px;outline:none;width:130px;font-family:'Funnel Sans',sans-serif}
.inv-num-inp:focus{border-color:var(--text)}
</style>
</head>
<body>
<header id="app-header">
  <span class="logo-text">LSC CREATIVE<em>.</em></span>
  <div id="hdr-right">
    <button class="nav-link" id="logo-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>LSC Creative</button>
    <button class="nav-link" id="nav-estimates">Estimates</button>
    <button class="nav-link" id="nav-pricing">Pricing</button>
    <button class="nav-link" id="nav-invoice-settings">Invoice Settings</button>
  </div>
</header>
<div id="main"></div>
<div class="export-toast" id="export-toast">
  <div class="toast-dot" id="toast-dot"></div>
  <div id="toast-msg"></div>
</div>
<div class="modal-overlay" id="modal-invoice-settings">
  <div class="modal-box">
    <div class="modal-title">Invoice Settings</div>
    <div class="form-grid">
      <div class="field"><label>Bank Name</label><input id="inv-bank-name" type="text" placeholder="e.g. Commonwealth Bank"></div>
      <div class="field"><label>Account Name</label><input id="inv-account-name" type="text" placeholder="e.g. LSC Creative Pty Ltd"></div>
      <div class="field"><label>BSB</label><input id="inv-bsb" type="text" placeholder="e.g. 062-000"></div>
      <div class="field"><label>Account Number</label><input id="inv-account-num" type="text" placeholder="e.g. 12345678"></div>
      <div class="field full"><label>Payment Terms</label><textarea id="inv-payment-terms" placeholder="e.g. Strictly 14 Days — EFT only. Please reference invoice number."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="btn-close-inv-settings">Cancel</button>
      <button class="btn btn-accent" id="btn-save-inv-settings">Save Details</button>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';

var TAX_RATE=0.35;
var rowCounter=0;
function rid(){return 'r'+(++rowCounter);}

var DEFAULT_LABOUR=[
  {id:'preprod',label:'Pre-Production',rows:[
    {name:'Pre-Production Meeting with Client',rate:40,mu:56},
    {name:'Pre-Production Development & Admin',rate:30,mu:42},
  ]},
  {id:'prod',label:'Production',rows:[
    {name:'Video Capture',rate:100,mu:140},
    {name:'Photo Capture',rate:80,mu:112},
    {name:'Drone Aerial Capture',rate:60,mu:84},
  ]},
  {id:'post',label:'Post-Production',rows:[
    {name:'Video Editor — Project Setup',rate:35,mu:49},
    {name:'Video Editor — B-Roll Offline Edit',rate:45,mu:63},
    {name:'Video Editor — A-Roll Offline Edit',rate:45,mu:63},
    {name:'Video Editor — A-Roll RC',rate:100,mu:140},
    {name:'Video Editor — Longform RC',rate:100,mu:140},
    {name:'Video Editor — Longform AC',rate:100,mu:140},
    {name:'Video Editor — Longform Draft',rate:100,mu:140},
    {name:'Video Editor — Longform Colour',rate:100,mu:140},
    {name:'Video Editor — Longform Sound Mix/Master',rate:100,mu:140},
    {name:'Video Editor — Socials',rate:90,mu:126},
    {name:'Processed Footage Handover [Over Cloud]',rate:35,mu:49},
    {name:'Raw Footage Handover [on HDD]',rate:70,mu:98,customBill:true},
    {name:'Photo Editor',rate:110,mu:154},
  ]},
];

var DEFAULT_TRAVEL=[
  {name:'Fuel & Tolls',rate:1,mu:1,directCost:true},
  {name:'Crew Meals',rate:30,mu:30,unit:'meals'},
  {name:'Transport & Logistics Hrs',rate:25,mu:35},
  {name:'Flights & Public Transport',rate:0,mu:0,directCost:true},
  {name:'Crew Accommodation',rate:0,mu:0,directCost:true},
];

var labourSections=JSON.parse(JSON.stringify(DEFAULT_LABOUR));
var travelRows=JSON.parse(JSON.stringify(DEFAULT_TRAVEL));
var projects=[],nextId=1,view='list',editProj=null,viewingId=null;

// Invoice settings persistence
function loadInvoiceSettings(){
  try{return JSON.parse(localStorage.getItem('lsc-invoice-settings')||'{}');}catch(e){return{};}
}
function saveInvoiceSettings(s){
  try{localStorage.setItem('lsc-invoice-settings',JSON.stringify(s));}catch(e){}
}

function fmt(n){return'$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function pad(n){return n<10?'00'+n:n<100?'0'+n:''+n;}
function today(){return new Date().toISOString().slice(0,10);}
function $id(id){return document.getElementById(id);}
function qsa(s,c){return(c||document).querySelectorAll(s);}

var toastTimer;
function showToast(msg,type,link){
  var t=$id('export-toast'),d=$id('toast-dot'),m=$id('toast-msg');
  if(!t||!d||!m)return;
  m.innerHTML=msg+(link?'<span class="toast-link" id="tl-el">Open in Finder →</span>':'');
  if(link){var el=$id('tl-el');if(el)el.addEventListener('click',function(){window.electronAPI&&window.electronAPI.openFolder();});}
  t.className='export-toast show '+(type||'');d.className='toast-dot '+(type||'');
  clearTimeout(toastTimer);
  if(type==='ok'||type==='err')toastTimer=setTimeout(function(){t.classList.remove('show');},5000);
}

function setNav(){
  $id('nav-estimates').classList.toggle('active',view!=='pricing');
  $id('nav-pricing').classList.toggle('active',view==='pricing');
}
function render(){
  setNav();
  var m=$id('main');
  if(view==='list')renderList(m);
  else if(view==='form')renderForm(m);
  else if(view==='estimate')renderEstimate(m);
  else if(view==='pricing')renderPricing(m);
}
$id('logo-btn').addEventListener('click',function(){view='list';render();});
$id('nav-estimates').addEventListener('click',function(){view='list';render();});
$id('nav-pricing').addEventListener('click',function(){view='pricing';render();});
$id('nav-invoice-settings').addEventListener('click',function(){openInvoiceSettingsModal();});

// ── LIST ──────────────────────────────────────────────────────────────────────
function renderList(el){
  var html='<div class="page-head"><div><div class="page-title">Estimates</div>'+
    '<div class="page-sub">'+(projects.length?projects.length+' estimate'+(projects.length!==1?'s':''):'No estimates yet')+'</div></div>'+
    '<button class="btn btn-accent" id="js-new">+ New Estimate</button></div>';
  if(!projects.length){
    html+='<div class="empty-state"><h3>No estimates yet</h3><p>Click <strong>New Estimate</strong> to get started.</p></div>';
  }else{
    html+='<div class="cards-grid">';
    projects.forEach(function(p){
      html+='<div class="proj-card" data-id="'+p.id+'">'+
        '<div class="card-num">'+esc(p.upid||'—')+'</div>'+
        '<div class="card-name">'+esc(p.name)+'</div>'+
        '<div class="card-client">'+esc(p.businessName||'—')+'</div>'+
        '<div style="margin-bottom:8px">'+(p.docType==='invoice'?'<span style="font-size:9px;padding:2px 7px;border:1px solid var(--accent);color:var(--accent);letter-spacing:.05em">INVOICE</span>':'<span style="font-size:9px;padding:2px 7px;border:1px solid var(--border);color:var(--muted);letter-spacing:.05em">ESTIMATE</span>')+'</div>'+
        '<div class="card-gross-label">Net Invoice</div>'+
        '<div class="card-gross">'+fmt(p.net)+'</div>'+
        '<div class="card-foot"><div class="card-date">'+esc(p.date||'—')+'</div><div class="tag">'+esc(p.clientName||'—')+'</div></div>'+
      '</div>';
    });
    html+='</div>';
  }
  el.innerHTML=html;
  $id('js-new').addEventListener('click',function(){editProj=null;view='form';render();});
  qsa('.proj-card',el).forEach(function(c){c.addEventListener('click',function(){viewingId=parseInt(c.dataset.id);view='estimate';render();});});
}

// ── RECALC ────────────────────────────────────────────────────────────────────
function recalc(){
  var labourTotal=0,expenseTotal=0,totalHours=0;
  labourSections.forEach(function(sec){
    var secTotal=0;
    var tbody=$id('tbody-'+sec.id);
    if(!tbody)return;
    tbody.querySelectorAll('[data-rid]').forEach(function(tr){
      var qInp=tr.querySelector('.qty-inp');
      var qty=parseFloat(qInp&&qInp.value)||0;
      totalHours+=qty;
      var mu=parseFloat(tr.dataset.mu)||0;
      var custInp=tr.querySelector('.custom-bill-inp');
      var custVal=parseFloat(custInp&&custInp.value)||0;
      var bill=custVal>0?custVal:qty*mu;
      secTotal+=bill;
      var bc=tr.querySelector('.bill-cell');if(bc)bc.textContent=fmt(bill);
    });
    labourTotal+=secTotal;
    var se=$id('sum-'+sec.id);if(se)se.textContent=fmt(secTotal);
  });

  var travelTotal=0;
  var ttbody=$id('tbody-travel');
  if(ttbody){
    ttbody.querySelectorAll('[data-rid]').forEach(function(tr){
      var qInp=tr.querySelector('.qty-inp');
      var qty=parseFloat(qInp&&qInp.value)||0;
      var isDirect=tr.dataset.direct==='true';
      var mu=parseFloat(tr.dataset.mu)||0;
      var bill=isDirect?qty:qty*mu;
      travelTotal+=bill;expenseTotal+=bill;
      var bc=tr.querySelector('.bill-cell');if(bc)bc.textContent=fmt(bill);
    });
  }
  var tse=$id('sum-travel');if(tse)tse.textContent=fmt(travelTotal);

  var equipTotal=0;
  var etbody=$id('tbody-equip');
  if(etbody){
    etbody.querySelectorAll('[data-rid]').forEach(function(tr){
      var dInp=tr.querySelector('.days-inp');
      var cInp=tr.querySelector('.cost-inp');
      var bill=(parseFloat(dInp&&dInp.value)||0)*(parseFloat(cInp&&cInp.value)||0);
      equipTotal+=bill;expenseTotal+=bill;
      var bc=tr.querySelector('.bill-cell');if(bc)bc.textContent=fmt(bill);
    });
  }
  var ese=$id('sum-equip');if(ese)ese.textContent=fmt(equipTotal);

  var crewTotal=0;
  var ctbody=$id('tbody-crew');
  if(ctbody){
    ctbody.querySelectorAll('[data-rid]').forEach(function(tr){
      var dInp=tr.querySelector('.days-inp');
      var cInp=tr.querySelector('.cost-inp');
      var bill=(parseFloat(dInp&&dInp.value)||0)*(parseFloat(cInp&&cInp.value)||0);
      crewTotal+=bill;expenseTotal+=bill;
      var bc=tr.querySelector('.bill-cell');if(bc)bc.textContent=fmt(bill);
    });
  }
  var cse=$id('sum-crew');if(cse)cse.textContent=fmt(crewTotal);

  var net=labourTotal+expenseTotal;
  var tax=labourTotal*TAX_RATE;
  var grossProfit=net-tax;
  function sv(id,v){var e=$id(id);if(e)e.textContent=v;}
  sv('s-labour',fmt(labourTotal));sv('s-expenses',fmt(expenseTotal));
  sv('s-net',fmt(net));sv('s-tax',fmt(tax));sv('s-gross',fmt(grossProfit));sv('s-hrs',totalHours);
}

// ── ROW BUILDERS ─────────────────────────────────────────────────────────────
function buildLabourRow(rowDef,qty,override){
  var id=rid();
  var tr=document.createElement('div');
  tr.className='gt-row labour-grid';
  tr.dataset.rid=id;tr.dataset.mu=rowDef.mu;tr.dataset.rate=rowDef.rate;
  var custCell='';
  if(rowDef.customBill){
    custCell='<input class="num-inp custom-bill-inp" type="number" min="0" step="0.01" value="'+(override||'')+'" title="Override bill ($)">';
  }
  tr.innerHTML=
    '<div>'+esc(rowDef.name)+'</div>'+
    '<div class="right"><input class="num-inp qty-inp" type="number" min="0" step="0.5" value="'+(qty||'')+'"></div>'+
    '<div class="right muted-td">'+(rowDef.rate>0?fmt(rowDef.rate):'—')+'</div>'+
    '<div class="right muted-td">'+fmt(rowDef.mu)+'</div>'+
    '<div class="right"><span class="bill-cell">'+fmt((qty||0)*rowDef.mu)+'</span>'+custCell+'</div>'+
    '<div style="justify-content:center"><button class="del-btn" title="Remove">×</button></div>';
  bindLabourRowEvents(tr);
  return tr;
}

function buildTravelRow(rowDef,qty){
  var id=rid();
  var tr=document.createElement('div');
  tr.className='gt-row expense-grid';
  tr.dataset.rid=id;tr.dataset.mu=rowDef.mu;tr.dataset.direct=rowDef.directCost?'true':'false';
  var rateLabel=rowDef.directCost?'Direct':(rowDef.rate>0?fmt(rowDef.rate):'—');
  var muLabel=rowDef.directCost?'—':(rowDef.mu!==rowDef.rate?fmt(rowDef.mu):'None');
  tr.innerHTML=
    '<div>'+esc(rowDef.name)+'</div>'+
    '<div class="right"><input class="num-inp qty-inp" type="number" min="0" step="0.01" value="'+(qty||'')+'"></div>'+
    '<div class="right muted-td">'+rateLabel+'</div>'+
    '<div class="right muted-td">'+muLabel+'</div>'+
    '<div class="right"><span class="bill-cell">'+fmt(0)+'</span></div>'+
    '<div style="justify-content:center"><button class="del-btn" title="Remove">×</button></div>';
  bindTravelRowEvents(tr);
  return tr;
}

function buildEquipRow(vendor,days,cost){
  var id=rid();
  var tr=document.createElement('div');
  tr.className='gt-row expense-grid';
  tr.dataset.rid=id;
  tr.innerHTML=
    '<div><input class="text-inp vendor-inp" type="text" value="'+esc(vendor||'')+'" placeholder="Vendor / item name"></div>'+
    '<div class="right"><input class="num-inp days-inp" type="number" min="0" step="0.5" value="'+(days||'')+'"></div>'+
    '<div class="right"><input class="num-inp cost-inp" type="number" min="0" step="0.01" value="'+(cost||'')+'"></div>'+
    '<div class="right muted-td">—</div>'+
    '<div class="right"><span class="bill-cell">'+fmt((days||0)*(cost||0))+'</span></div>'+
    '<div style="justify-content:center"><button class="del-btn" title="Remove">×</button></div>';
  bindEquipRowEvents(tr);
  return tr;
}

function buildCrewRow(role,days,cost){
  var id=rid();
  var tr=document.createElement('div');
  tr.className='gt-row expense-grid';
  tr.dataset.rid=id;
  tr.innerHTML=

function removeRow(tr){

function restoreRows(ar){
  labourSections.forEach(function(sec){
    (ar[sec.id]||[]).forEach(function(saved){
      var rowDef=sec.rows.find(function(r){return r.name===saved.name;});
      if(!rowDef)return;
      injectRow($id('tbody-'+sec.id),buildLabourRow(rowDef,saved.qty,saved.override));
    });
  });
  (ar.travel||[]).forEach(function(saved){
    var rowDef=travelRows.find(function(r){return r.name===saved.name;});
    if(!rowDef)return;
    injectRow($id('tbody-travel'),buildTravelRow(rowDef,saved.qty));
  });
  (ar.equip||[]).forEach(function(eq){injectRow($id('tbody-equip'),buildEquipRow(eq.vendor,eq.days,eq.cost));});
  (ar.crew||[]).forEach(function(cr){injectRow($id('tbody-crew'),buildCrewRow(cr.role,cr.days,cr.cost));});
  (ar.deliverables||[]).forEach(function(d){injectRow($id('tbody-deliverables'),buildDeliverableRow(d.name,d.format,d.duration,d.qty));});
}

function collectActiveRows(){
  var ar={travel:[],equip:[],crew:[],deliverables:[]};
  labourSections.forEach(function(sec){
    ar[sec.id]=[];
    var tbody=$id('tbody-'+sec.id);if(!tbody)return;
    tbody.querySelectorAll('[data-rid]').forEach(function(tr){
      var qInp=tr.querySelector('.qty-inp');
      var cInp=tr.querySelector('.custom-bill-inp');
      ar[sec.id].push({name:tr.firstElementChild&&tr.firstElementChild.textContent.trim(),qty:parseFloat(qInp&&qInp.value)||0,override:parseFloat(cInp&&cInp.value)||0});
    });
  });
  var ttbody=$id('tbody-travel');
  if(ttbody)ttbody.querySelectorAll('[data-rid]').forEach(function(tr){
    var qInp=tr.querySelector('.qty-inp');
    ar.travel.push({name:tr.firstElementChild&&tr.firstElementChild.textContent.trim(),qty:parseFloat(qInp&&qInp.value)||0});
  });
  var etbody=$id('tbody-equip');
  if(etbody)etbody.querySelectorAll('[data-rid]').forEach(function(tr){
    ar.equip.push({vendor:(tr.querySelector('.vendor-inp')&&tr.querySelector('.vendor-inp').value)||'',days:parseFloat(tr.querySelector('.days-inp')&&tr.querySelector('.days-inp').value)||0,cost:parseFloat(tr.querySelector('.cost-inp')&&tr.querySelector('.cost-inp').value)||0});
  });
  var ctbody=$id('tbody-crew');
  if(ctbody)ctbody.querySelectorAll('[data-rid]').forEach(function(tr){
    ar.crew.push({role:(tr.querySelector('.role-inp')&&tr.querySelector('.role-inp').value)||'',days:parseFloat(tr.querySelector('.days-inp')&&tr.querySelector('.days-inp').value)||0,cost:parseFloat(tr.querySelector('.cost-inp')&&tr.querySelector('.cost-inp').value)||0});
  });
  var dtbody=$id('tbody-deliverables');
  if(dtbody)dtbody.querySelectorAll('[data-rid]').forEach(function(tr){
    ar.deliverables.push({name:(tr.querySelector('.deliv-name-inp')&&tr.querySelector('.deliv-name-inp').value)||'',format:(tr.querySelector('.deliv-fmt-inp')&&tr.querySelector('.deliv-fmt-inp').value)||'',duration:(tr.querySelector('.deliv-dur-inp')&&tr.querySelector('.deliv-dur-inp').value)||'',qty:parseFloat(tr.querySelector('.deliv-qty-inp')&&tr.querySelector('.deliv-qty-inp').value)||1});
  });
  return ar;
}

function computeTotals(ar){
  var labourTotal=0,expenseTotal=0,totalHours=0;
  labourSections.forEach(function(sec){
    (ar[sec.id]||[]).forEach(function(saved){
      var rd=sec.rows.find(function(r){return r.name===saved.name;});if(!rd)return;
      totalHours+=saved.qty||0;
      labourTotal+=saved.override>0?saved.override:(saved.qty||0)*rd.mu;
    });
  });
  (ar.travel||[]).forEach(function(saved){
    var rd=travelRows.find(function(r){return r.name===saved.name;});if(!rd)return;
    expenseTotal+=rd.directCost?(saved.qty||0):(saved.qty||0)*rd.mu;
  });
  (ar.equip||[]).forEach(function(eq){expenseTotal+=(eq.days||0)*(eq.cost||0);});
  (ar.crew||[]).forEach(function(cr){expenseTotal+=(cr.days||0)*(cr.cost||0);});
  var net=labourTotal+expenseTotal,tax=labourTotal*TAX_RATE;
  return{labourTotal:labourTotal,expenseTotal:expenseTotal,net:net,tax:tax,grossProfit:net-tax,totalHours:totalHours};
}

function saveProject(){
  var name=($id('f-name')&&$id('f-name').value||'').trim();
  if(!name){alert('Please enter a Project Name.');return;}
  var upid=($id('f-upid')&&$id('f-upid').value||'').trim();
  if(!upid){alert('Please enter a UPID.');return;}
  var ar=collectActiveRows(),t=computeTotals(ar);
  var proj={id:editProj?editProj.id:nextId++,upid:upid,name:name,
    businessName:($id('f-business')&&$id('f-business').value||'').trim(),
    clientName:($id('f-clientname')&&$id('f-clientname').value||'').trim(),
    clientEmail:($id('f-clientemail')&&$id('f-clientemail').value||'').trim(),
    date:$id('f-date')&&$id('f-date').value||'',
    notes:($id('f-notes')&&$id('f-notes').value||'').trim(),
    docType:($id('f-doctype')&&$id('f-doctype').value)||'estimate',
    invoiceNumber:($id('f-invnum')&&$id('f-invnum').value||'').trim(),
    activeRows:ar,net:t.net,labourTotal:t.labourTotal,expenseTotal:t.expenseTotal,
    tax:t.tax,grossProfit:t.grossProfit,totalHours:t.totalHours};
  if(editProj){var idx=projects.findIndex(function(x){return x.id===proj.id;});if(idx!==-1)projects[idx]=proj;else projects.unshift(proj);}
  else projects.unshift(proj);
  editProj=null;viewingId=proj.id;view='estimate';render();
}
function deleteProject(){
  if(!editProj||!confirm('Delete this estimate?'))return;
  projects=projects.filter(function(x){return x.id!==editProj.id;});
  editProj=null;view='list';render();
}

async function doExport(proj,idx){
  var btn=$id('js-export'),spin=$id('exp-spin');
  if(btn)btn.disabled=true;if(spin)spin.style.display='inline-block';
  showToast('Generating PDF…','');
  var isInvoice=proj.docType==='invoice';
  var prefix=isInvoice?(proj.invoiceNumber||'INV'):(proj.upid||'EST-'+pad(idx+1));
  var base=prefix+' - '+(proj.businessName||'Client')+' - '+proj.name;
  try{
    if(window.electronAPI){
      var pdfHtml=isInvoice?buildClientInvoicePDF(proj):buildClientPDF(proj);
      var result=await window.electronAPI.exportPDF({html:pdfHtml,filename:base+'.pdf'});
      if(result.success)showToast('✓ '+(isInvoice?'Invoice':'Quote')+' PDF saved to 03 Project Quotes','ok',true);
      else showToast('⚠ Export issue: '+(result.error||'Unknown error'),'err');
    }else showToast('Run inside the desktop app to export','err');
  }catch(e){alert('EXPORT ERROR: '+String(e));showToast('⚠ Export failed — see alert','err');}
  if(btn)btn.disabled=false;if(spin)spin.style.display='none';
}

      html+='<tr><td>'+esc(row.name)+'</td>'+
        '<td style="text-align:right"><input type="number" min="0" step="0.01" value="'+row.rate+'" data-si="'+si+'" data-ri="'+ri+'" data-field="rate" data-type="labour"></td>'+
        '<td style="text-align:right"><input type="number" min="0" step="0.01" value="'+row.mu+'" data-si="'+si+'" data-ri="'+ri+'" data-field="mu" data-type="labour"></td></tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='<div class="pricing-section"><div class="pricing-sec-head"><span class="pricing-sec-label">Travel &amp; Accommodation</span>'+
    '<span style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Expenses</span></div>'+
    '<table class="pricing-table"><thead><tr><th>Service</th><th style="text-align:right">Rate ($)</th><th style="text-align:right">Mark-Up ($)</th></tr></thead><tbody>';
  travelRows.forEach(function(row,ri){
    html+='<tr><td>'+esc(row.name)+'</td>'+
      '<td style="text-align:right"><input type="number" min="0" step="0.01" value="'+row.rate+'" data-ri="'+ri+'" data-field="rate" data-type="travel"></td>'+
      '<td style="text-align:right"><input type="number" min="0" step="0.01" value="'+row.mu+'" data-ri="'+ri+'" data-field="mu" data-type="travel"></td></tr>';
  });
  html+='</tbody></table></div></div>'+
    '<div class="pricing-save-bar"><p>Rate changes apply to new estimates only. Expenses are tax-exempt.</p>'+
    '<div style="display:flex;align-items:center;gap:12px"><span class="saved-msg" id="saved-msg">✓ Rates saved</span>'+
    '<button class="btn btn-ghost btn-sm" id="js-reset">Reset Defaults</button>'+
    '<button class="btn btn-accent" id="js-save-pricing">Save Rates</button></div></div>';
  el.innerHTML=html;
  qsa('.pricing-table input',el).forEach(function(inp){
    inp.addEventListener('input',function(){
      var v=parseFloat(inp.value)||0;
      if(inp.dataset.type==='labour')labourSections[parseInt(inp.dataset.si)].rows[parseInt(inp.dataset.ri)][inp.dataset.field]=v;
      else if(inp.dataset.type==='travel')travelRows[parseInt(inp.dataset.ri)][inp.dataset.field]=v;
    });
  });
  $id('tax-inp').addEventListener('input',function(){TAX_RATE=parseFloat(this.value)/100||0.35;});
  $id('js-save-pricing').addEventListener('click',function(){var msg=$id('saved-msg');if(msg){msg.style.display='inline';setTimeout(function(){msg.style.display='none';},2500);}});
  $id('js-reset').addEventListener('click',function(){
    if(!confirm('Reset all rates to defaults?'))return;
    labourSections=JSON.parse(JSON.stringify(DEFAULT_LABOUR));
    travelRows=JSON.parse(JSON.stringify(DEFAULT_TRAVEL));
    TAX_RATE=0.35;renderPricing(el);
  });
}

// ── INVOICE SETTINGS MODAL ────────────────────────────────────────────────────────────────────────────
function openInvoiceSettingsModal(){
  var s=loadInvoiceSettings();
  var f=$id('inv-bank-name');if(f)f.value=s.bankName||'';
  var a=$id('inv-account-name');if(a)a.value=s.accountName||'';
  var b=$id('inv-bsb');if(b)b.value=s.bsb||'';
  var n=$id('inv-account-num');if(n)n.value=s.accountNumber||'';
  var t=$id('inv-payment-terms');if(t)t.value=s.paymentTerms||'';
  var overlay=$id('modal-invoice-settings');
  if(overlay)overlay.classList.add('open');
}
function closeInvoiceSettingsModal(){
  var overlay=$id('modal-invoice-settings');
  if(overlay)overlay.classList.remove('open');
}
$id('btn-close-inv-settings').addEventListener('click',closeInvoiceSettingsModal);
$id('btn-save-inv-settings').addEventListener('click',function(){
  var s={
    bankName:($id('inv-bank-name')&&$id('inv-bank-name').value||'').trim(),
    accountName:($id('inv-account-name')&&$id('inv-account-name').value||'').trim(),
    bsb:($id('inv-bsb')&&$id('inv-bsb').value||'').trim(),
    accountNumber:($id('inv-account-num')&&$id('inv-account-num').value||'').trim(),
    paymentTerms:($id('inv-payment-terms')&&$id('inv-payment-terms').value||'').trim()
  };
  saveInvoiceSettings(s);
  closeInvoiceSettingsModal();
  showToast('✓ Invoice settings saved','ok');
});
$id('modal-invoice-settings').addEventListener('click',function(e){
  if(e.target===this)closeInvoiceSettingsModal();
});

render();
})();
</script>
</body>
